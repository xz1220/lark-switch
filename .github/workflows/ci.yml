name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: src/go.mod
      - name: Vet
        working-directory: src
        run: go vet ./...
      - name: Test
        working-directory: src
        run: go test ./...
      - name: Build
        working-directory: src
        run: go build -o /dev/null .
